server:
  tomcat:
    max-http-post-size: 2147483648          # 2GB，POST请求最大大小
    max-http-header-size: 8388608            # 8MB，HTTP请求头最大大小
    connection-timeout: 600000               # 600秒，连接超时时间
    keep-alive-timeout: 600000               # 600秒，Keep-Alive超时时间
    threads:
      max: 500                               # 最大线程数
      min-spare: 50                          # 最小空闲线程数
  servlet:
    session:
      timeout: 3600                          # 1小时，Session超时时间
spring:
  servlet:
    multipart:
      max-file-size: 2147483648              # 2GB，单个文件最大大小
      max-request-size: 2147483648           # 2GB，整个请求最大大小
  mvc:
    async:
      request-timeout: 600000                # 600秒，异步请求超时
