services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: fast-admin-api:latest
    restart: unless-stopped
    env_file:
      - ${FAST_ADMIN_ENV_FILE:-.env}
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-fast-admin-redis}
    depends_on:
      - redis

  web:
    build:
      context: ../fast-admin-ui
      dockerfile: ../deploy/Dockerfile.web
    image: fast-admin-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-80}:8080"
    depends_on:
      - api

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    command: sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-fast-admin-redis}
    volumes:
      - redis-data:/data

volumes:
  redis-data:
